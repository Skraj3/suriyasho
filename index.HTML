<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suriya Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ff9900;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

.cart{
font-size:20px;
}

.hero{
height:400px;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:50px;
}

.products{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:8px;
}

.card h3{
margin:10px 0;
}

.price{
font-size:22px;
font-weight:bold;
color:green;
}

button{
background:#ff9900;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#e68a00;
}

footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<header>
<div class="logo">Suriya Shop</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Contact</a>
</nav>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>
</header>

<section class="hero">
<div>
<h1>Welcome to Suriya Shop</h1>
<p>Best Fashion Store For Men, Women & Kids</p>
</div>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600" alt="">
<h3>Men T-Shirt</h3>
<p class="price">₹499</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=600" alt="">
<h3>Women Dress</h3>
<p class="price">₹999</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea?w=600" alt="">
<h3>Kids Wear</h3>
<p class="price">₹699</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="">
<h3>Sports Shoes</h3>
<p class="price">₹1499</p>
<button onclick="addToCart()">Add To Cart</button>
</div>

</section>

<footer>
<h3>Suriya Shop</h3>
<p>© 2026 All Rights Reserved</p>
</footer>

<script>
let cart = 0;

function addToCart(){
cart++;
document.getElementById("cartCount").innerText = cart;
alert("Product Added To Cart");
}
</script>

</body>
</html>
